<!DOCTYPE html>
<html lang="en">
<head>
    <style>*{
    margin:0;
    padding:0;
}
body{
    width: 100vw;
    height: 100vh;
    background: #c1c1c4;
    display: flex;
    justify-content: center;
    align-items: center;
}
#clock{
    width: 18rem;
    height: 18rem;
    background: url('clock.png');
    background-size: 120%;
    border-radius: ; 
}
.clock1{
    box-shadow:
    -8px -8px 20px #e1e1e4, 
    8px 8px 20px #727276, 
    inset -4px -4px 20px #e1e1e4,
    inset 4px 4px 20px #727276;
}
.clock2{
    box-shadow:
    -9px -9px 20px #2b2a2b, 
    9px 9px 20px #050205, 
    inset -4px -4px 20px #2b2a2b,
    inset 4px 4px 20px #050205;
}
#bt{
    position: absolute;
    bottom: 20%;
    padding: 10px;
    background: #111;
    color: #eee;
    font-size: 25px;
    letter-spacing: 2px;
    border-radius: 50px;
    font-weight: 500;
}
#center{
    width: 0.8rem;
    height: 0.8rem;
    border-radius: 50%;
    background: #212;
    position: absolute;
    transform: translate(-50%, -50%);
    left: 50%;
    top: 50%;
    z-index: 4;
}
#hour, #minute, #second{
    transform-origin: bottom;
    z-index: 2;
    position: absolute;
    translate: translateX(-50%);
    left: 50%;
    bottom: 50%;
}
#hour{
    width: 0.3rem;
    height: 4rem;
    background: #ed1256;
    border-radius: 50%;
}
#minute{
    width: 0.2rem;
    height: 5.5rem;
    background: #1290ee;
    border-radius: 50%;
}
#second{
    width: 0.1rem;
    height: 7rem;
    background: #1f221e;
    border-radius: 50%;
}
  </style>
    <title>Farhan's Clock</title>
    <link rel="shortcut icon" type="image/jpg" href="clock.jpg">
    <link rel="stylesheet" type="text/css" href="clock.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body id="body">
    <div class="clock1" id="clock">
        <div id="center"></div>
        <div id="hour" ></div>
        <div id="minute"></div>
        <div id="second"></div>
    </div>
    <button id="bt" onclick="toggle()">Dark Theme</button>
</body>
<script >
  let state = false
function toggle() {
    let body = document.getElementById('body')
    let clock = document.getElementById('clock')
    let mode = document.getElementById('bt')
    let center = document.getElementById('center')
    let second = document.getElementById('second')
    if (state) {
        body.style.backgroundColor = '#c1c1c4'
        clock.className = 'clock1'
        mode.innerText = 'Dark Theme'
        mode.style.background = '#111'
        mode.style.color = '#eee'
        center.style.backgroundColor = '#363436'
        second.style.backgroundColor = '#1f221e'
        state = false
    }
    else {
        body.style.backgroundColor = '#1c1f1c'
        clock.className = 'clock2'
        mode.innerText = 'Light Theme'
        mode.style.background = '#eee'
        mode.style.color = '#111'
        center.style.backgroundColor = '#cbc'
        second.style.backgroundColor = '#e2e1f6'
        state = true
    }
}
setInterval(() => 
{
    d = new Date()
    let htime = d.getHours()
    let mtime = d.getMinutes()
    let stime = d.getSeconds()
    let hrotation = 30 * htime + mtime / 2
    let mrotation = 6 * mtime
    let srotation = 6 * stime
    hour.style.transform = `rotate(${hrotation}deg)`
    minute.style.transform = `rotate(${mrotation}deg)`
    second.style.transform = `rotate(${srotation}deg)`
}, 1000)
  </script>
</html>
